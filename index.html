<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Card</title>

<style>
@font-face {
    font-family: 'Beiruti';
    src: url('Beiruti-Medium.ttf') format('truetype');
}

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
    margin:0;
    padding:20px;
}

.container{
    position:relative;
    display:inline-block;
}

canvas{
    max-width:100%;
    border-radius:10px;
}

.controls{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:5px;
}

.primary{
    background:#0d3b66;
    color:white;
}

.success{
    background:#f4b400;
    color:black;
}

input{
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
    margin:10px 0;
    width:250px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <canvas id="canvas"></canvas>
</div>

<div class="controls">
    <button class="primary" onclick="showInput()">اكتب الاسم</button>

    <div id="inputArea" style="display:none;">
        <br>
        <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
        <br>
        <button class="success" onclick="generateImage()">تأكيد ثم تحميل</button>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "post.jpg";

img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
}

function showInput(){
    document.getElementById("inputArea").style.display="block";
}

function generateImage(){
    const name = document.getElementById("nameInput").value.trim();
    if(name === ""){
        alert("اكتب الاسم أولاً");
        return;
    }

    ctx.drawImage(img,0,0);

    const rectWidth = 600;
    const rectHeight = 100;
    const rectX = (canvas.width - rectWidth) / 2;
    const rectY = canvas.height - 270; 

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // تحميل الخط قبل الكتابة
    document.fonts.load("60px Beiruti").then(() => {
        ctx.font = "60px Beiruti";
        ctx.fillText(name, canvas.width/2, rectY + rectHeight/2);

        const link = document.createElement("a");
        link.download = "ramadan-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}
</script>

</body>
</html>
