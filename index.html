<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Certificates Generator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@font-face {
    font-family: 'Beiruti';
    src: url('fonts/Beiruti-Bold.ttf') format('truetype');
    font-weight: bold;
    font-style: normal;
}

body {
    direction: rtl;
    background: #f5f7fa;
}

#certificate {
    position: relative;
    width: 800px;
    margin: auto;
}

#certificate img {
    width: 100%;
    border-radius: 10px;
}

.name {
    position: absolute;
    top: 270px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 38px;
    font-weight: bold;
    color: #194d6e;
    font-family: 'Beiruti', sans-serif;
}

/* Login Style */
.login-container {
    max-width: 400px;
    margin: 100px auto;
}
</style>
</head>

<body>
    <!-- Login Form -->
<div id="loginPage">
    <div class="container">
        <div class="login-container card shadow-lg p-5">
            <h3 class="text-center mb-4">🔐 تسجيل الدخول</h3>
            <div class="mb-3">
                <input type="text" id="usernameInput" class="form-control" placeholder="اسم المستخدم">
            </div>
            <div class="mb-4">
                <input type="password" id="passwordInput" class="form-control" placeholder="كلمة المرور">
            </div>
            <button onclick="login()" class="btn btn-primary w-100 btn-lg">دخول</button>
            <div id="loginError" class="text-danger text-center mt-3"></div>
        </div>
    </div>
</div>

<div id="mainPage" class="d-none">

    <div class="container py-5">

        <div class="card shadow-lg p-4 text-center">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>🎓 إنشاء شهادة</h3>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">خروج</button>
            </div>

            <!-- الأزرار -->
            <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
            <button class="btn btn-outline-primary" onclick="selectTemplate('file1')">منظور العلاج الوظيفي في تنمية المهار ات الحر كية الدقيقة في مر حلة الطفولة المبكرة</button>    
            <button class="btn btn-outline-primary" onclick="selectTemplate('file2')">دور مهارة الطلب في تحسين التواصل واللفة لدى ذوي اضطراب طيف التوحد</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file3')">الوسائل المساندة لتطوير المهارات اللغة</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file4')">الصلابة النفسية للأسرة في ظل اضطرابات طيف التوحد (كيف نعتني بأنفسنا لنتمكن من دعم ابناءنا بثبات ووعي)</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file5')">التأهيل المهني لتعزيز مشاركة الأشخاص ذوي الإعاقة</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file6')">الانتقائية في تناول الطعام</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file7')">تقليل العبء الاقتصادي ورفع جودة الحياة لذوي اضطراب طيف التوحد</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file8')">رحلة التقبل والتعاون مفتاح نجاح الطفل ذو اضطراب طيف التوحد</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file9')">تنمية مهارات التواصل الوظيفي عند الأطفال ذوي اضطراب طيف التوحد</button>
            <button class="btn btn-outline-primary" onclick="selectTemplate('file10')">تطوير المهارات المعرفية والأكاديمية لذوي اضطراب التوحد</button>


        </div>

        <!-- input -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <input type="text" id="username" class="form-control form-control-lg text-center" placeholder="اكتب الاسم هنا">
            </div>
        </div>

        <button class="btn btn-primary btn-lg px-5" onclick="generatePDF()">
            تحميل الشهادة
        </button>
    </div>

    <div class="mt-5 text-center">
        <div id="certificate">
            <img id="templateImage" src="certificate-01.png">
            <div class="name" id="nameText">Name Name</div>
        </div>

    </div>

</div>

<script>
// بيانات الدخول (غيرها حسب رغبتك)
const VALID_USER = "admin";
const VALID_PASS = "GD12f3#@$ff";

// التحقق من الجلسة عند تحميل الصفحة
window.onload = function() {
    if (sessionStorage.getItem("isLoggedIn") === "true") {
        showMainPage();
    }
};

function login() {
    const user = document.getElementById("usernameInput").value.trim();
    const pass = document.getElementById("passwordInput").value.trim();
    const errorDiv = document.getElementById("loginError");

    if (user === VALID_USER && pass === VALID_PASS) {
        sessionStorage.setItem("isLoggedIn", "true");
        showMainPage();
    } else {
        errorDiv.textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
    }
}

function showMainPage() {
    document.getElementById("loginPage").classList.add("d-none");
    document.getElementById("mainPage").classList.remove("d-none");
}

function logout() {
    if (confirm("هل تريد تسجيل الخروج؟")) {
        sessionStorage.removeItem("isLoggedIn");
        location.reload();
    }
}

let currentTemplate = 'certificate-01.png';

function selectTemplate(type) {
    if (type === 'file1') currentTemplate = 'certificate-01.png';
    if (type === 'file2') currentTemplate = 'certificate-02.png';
    if (type === 'file3') currentTemplate = 'certificate-03.png';
    if (type === 'file4') currentTemplate = 'certificate-04.png';
    if (type === 'file5') currentTemplate = 'certificate-05.png';
    if (type === 'file6') currentTemplate = 'certificate-06.png';
    if (type === 'file7') currentTemplate = 'certificate-07.png';
    if (type === 'file8') currentTemplate = 'certificate-08.png';
    if (type === 'file9') currentTemplate = 'certificate-09.png';
    if (type === 'file10') currentTemplate = 'certificate-10.png';

    document.getElementById('templateImage').src = currentTemplate;
}

document.getElementById('username').addEventListener('input', function () {
    document.getElementById('nameText').innerText = this.value || 'Name Name';
});

async function generatePDF() {
    const { jsPDF } = window.jspdf;
    let element = document.getElementById('certificate');

    const canvas = await html2canvas(element, {
        scale: 4,
        useCORS: true,
        allowTaint: true,
        logging: false,
        backgroundColor: null
    });

    const imgData = canvas.toDataURL('image/png', 1.0);

    let pdf = new jsPDF({
        orientation: 'landscape',
        unit: 'px',
        format: [canvas.width, canvas.height]
    });

    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
    pdf.save("certificate.pdf");
}
</script>

</body>
</html>
